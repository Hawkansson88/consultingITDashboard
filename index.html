<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rekryteringspipeline · Consulting IT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: #e2e2de;
    --border-strong: #c8c8c2;
    --text: #1a1a1a;
    --muted: #888880;
    --subtle: #f0f0ec;
    --accent: #0a0a0a;
    --col1: #1a1a1a;
    --col2: #2d6be4;
    --col3: #e07b1a;
    --col4: #7c3aed;
    --col5: #16a34a;
    --col1-light: #f0f0ec;
    --col2-light: #eff4fe;
    --col3-light: #fef3e8;
    --col4-light: #f5f0ff;
    --col5-light: #f0faf3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Login */
  #login-screen {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 52px;
    width: 400px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  .login-logo {
    height: 32px;
    margin-bottom: 28px;
    object-fit: contain;
  }

  .login-box h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }

  .login-box p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .login-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 16px; /* Minst 16px förhindrar Safari-zoom */
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 10px;
  }

  .login-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: -0.01em;
  }

  .login-btn:hover { opacity: 0.82; }
  .login-error { margin-top: 10px; font-size: 12px; color: #dc2626; min-height: 18px; }

  /* Layout */
  .wrapper {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 28px;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .header-logo {
    height: 28px;
    object-fit: contain;
  }

  .header-divider {
    width: 1px;
    height: 24px;
    background: var(--border-strong);
  }

  .header-title {
    font-size: clamp(15px, 1.5vw, 20px);
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .header-title span { color: var(--muted); font-weight: 400; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--subtle);
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #16a34a;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #clock {
    font-size: clamp(14px, 1.4vw, 18px);
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  #refresh-countdown {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Updating indicator */
  #update-indicator {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }

  #update-indicator.visible { display: flex; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Status */
  #status-message {
    text-align: center;
    padding: 60px 20px;
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Pipeline – desktop */
  #pipeline {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    flex: 1;
    min-height: 0;
  }

  .stage-col {
    display: flex;
    flex-direction: column;
    min-height: 0;
    animation: fadeUp 0.35s ease both;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  /* Swipe dots */
  #swipe-dots {
    display: none;
    justify-content: center;
    gap: 6px;
    padding: 8px 0 2px;
    flex-shrink: 0;
  }

  .swipe-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border-strong);
    transition: background 0.2s, transform 0.2s;
  }

  .swipe-dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }

  /* Fullscreen button */
  #fullscreen-btn {
    display: none;
    background: var(--subtle);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 9px;
    cursor: pointer;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    align-items: center;
    gap: 5px;
    transition: background 0.15s;
  }

  #fullscreen-btn:hover { background: var(--border); }

  /* Mobile */
  @media (max-width: 768px) {
    html, body { overflow: hidden; scroll-behavior: auto; position: fixed; width: 100%; }
    .wrapper {
      padding: 14px 12px 10px;
    }
    header { margin-bottom: 12px; padding-bottom: 10px; }
    .header-divider, .header-title span { display: none; }
    .header-title { font-size: 14px; }
    #refresh-countdown, #update-indicator, .live-badge { display: none !important; }
    #fullscreen-btn { display: none !important; }
    .header-logo { height: 22px; }
    #swipe-dots { display: flex; }

    #pipeline {
      display: flex;
      flex-direction: row;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      gap: 10px;
      padding: 0 1px;
      scrollbar-width: none;
      /* Viktigt: ingen flex: 1 override på mobil */
      flex: 1;
      min-height: 0;
    }

    #pipeline::-webkit-scrollbar { display: none; }

    .stage-col {
      /* Exakt viewport-bredd minus padding */
      min-width: calc(100vw - 26px);
      max-width: calc(100vw - 26px);
      flex-shrink: 0;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      border-radius: 10px;
      min-height: 0;
    }

    .candidate-card .name {
      font-size: 15px;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
    }

    .candidate-card .job {
      font-size: 12px;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
    }

    .candidate-card { padding: 11px 14px; }
    .stage-title { font-size: 12px; }
    .stage-count { font-size: 16px; width: 28px; height: 28px; }
  }

  /* TV / large screens */
  @media (min-width: 1200px) {
    #fullscreen-btn { display: none !important; }
    .header-right { gap: 28px; }
    #refresh-countdown { 
      padding-right: 8px;
      border-right: 1px solid var(--border);
    }
  }

  .stage-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stage-col:nth-child(1) .stage-header { background: var(--col1-light); border-bottom-color: #d8d8d4; }
  .stage-col:nth-child(2) .stage-header { background: var(--col2-light); border-bottom-color: #c5d8fc; }
  .stage-col:nth-child(3) .stage-header { background: var(--col3-light); border-bottom-color: #fad9b4; }
  .stage-col:nth-child(4) .stage-header { background: var(--col4-light); border-bottom-color: #d8c8f8; }
  .stage-col:nth-child(5) .stage-header { background: var(--col5-light); border-bottom-color: #b4e4c2; }

  .stage-col:nth-child(1) { --col: var(--col1); border-top: 3px solid var(--col1); }
  .stage-col:nth-child(2) { --col: var(--col2); border-top: 3px solid var(--col2); }
  .stage-col:nth-child(3) { --col: var(--col3); border-top: 3px solid var(--col3); }
  .stage-col:nth-child(4) { --col: var(--col4); border-top: 3px solid var(--col4); }
  .stage-col:nth-child(5) { --col: var(--col5); border-top: 3px solid var(--col5); }

  .stage-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--col);
  }

  .stage-count {
    font-size: 15px;
    font-weight: 700;
    color: var(--col);
    background: var(--surface);
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
  }

  .stage-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .candidate-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--col);
    border-radius: 6px;
    padding: 8px 10px;
    animation: fadeUp 0.25s ease both;
    transition: box-shadow 0.15s;
  }

  .candidate-card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .candidate-card .name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .candidate-card .job {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
  }

  .empty-col {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 24px 0;
    opacity: 0.5;
  }

  /* Footer */
  footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <img class="login-logo" src="https://consultingit.se/wp-content/uploads/2024/02/cit_logo_horizontal_pos.png" alt="Consulting IT" onerror="this.style.display='none'">
    <h2>Rekryteringspipeline</h2>
    <p>Ange lösenord för att fortsätta</p>
    <input class="login-input" type="password" id="api-key-input" placeholder="Lösenord" autocomplete="off"/>
    <button class="login-btn" onclick="handleLogin()">Logga in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="wrapper">
  <header>
    <div class="header-left">
      <img class="header-logo" src="https://consultingit.se/wp-content/uploads/2024/02/cit_logo_horizontal_pos.png" alt="Consulting IT" onerror="this.style.display='none'">
      <div class="header-divider"></div>
      <div class="header-title">Rekryteringspipeline <span>/ Aktiva kandidater</span></div>
    </div>
    <div class="header-right">
      <div id="update-indicator">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
        Uppdaterar...
      </div>
      <div id="refresh-countdown">–</div>
      <div id="clock">--:--</div>
      <div class="live-badge"><span class="live-dot"></span>Live</div>
      <button id="fullscreen-btn" onclick="toggleFullscreen()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="fs-icon">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        Helskärm
      </button>
    </div>
  </header>

  <div id="status-message" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;justify-content:center">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite;opacity:0.4">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      <span id="progress-text">Laddar...</span>
    </div>
  </div>

  <div id="pipeline" style="display:none">
    <div class="stage-col">
      <div class="stage-header">
        <span class="stage-title">Intervju Internt</span>
        <span class="stage-count" id="count-0">0</span>
      </div>
      <div class="stage-body" id="body-0"></div>
    </div>
    <div class="stage-col">
      <div class="stage-header">
        <span class="stage-title">Presentation</span>
        <span class="stage-count" id="count-1">0</span>
      </div>
      <div class="stage-body" id="body-1"></div>
    </div>
    <div class="stage-col">
      <div class="stage-header">
        <span class="stage-title">Intervju Kund</span>
        <span class="stage-count" id="count-2">0</span>
      </div>
      <div class="stage-body" id="body-2"></div>
    </div>
    <div class="stage-col">
      <div class="stage-header">
        <span class="stage-title">Vidare i process</span>
        <span class="stage-count" id="count-3">0</span>
      </div>
      <div class="stage-body" id="body-3"></div>
    </div>
    <div class="stage-col">
      <div class="stage-header">
        <span class="stage-title">Anställd</span>
        <span class="stage-count" id="count-4">0</span>
      </div>
      <div class="stage-body" id="body-4"></div>
    </div>
  </div>

  <div id="swipe-dots">
    <div class="swipe-dot active" data-index="0"></div>
    <div class="swipe-dot" data-index="1"></div>
    <div class="swipe-dot" data-index="2"></div>
    <div class="swipe-dot" data-index="3"></div>
    <div class="swipe-dot" data-index="4"></div>
  </div>

  <footer>
    <span>Consulting IT · Drivs av TeamTailor API</span>
    <span id="last-updated">–</span>
  </footer>
</div>

<script>
// ============================================================
const REFRESH_INTERVAL = 5 * 60 * 1000;
const API_BASE = 'https://api.teamtailor.com/v1';
const PASSWORD_HASH = '40c7fcf72d7bba747daf4be72b76d2f680c31c07d81fb2f1c4f83c6df56d010f';
const _k = atob('alFQeUNSNUZtUGtGT1pTN3lGVVRYY2U1bkozbnZ6bDVEcjRzQWtxZA==');
// ============================================================

const STAGE_MAP = {
  'inbox':                      -1,
  'telefonintervju':            -1,
  'reviewing':                  0,
  'intervju':                   0,
  'interview':                  0,
  'teamsintervju':              0,
  'cv skickat till kund':       1,
  'inbokad intervju hos kund':  2,
  'teamsintervju hos kund':     2,
  'vidare i process':           3,
  'offered':                    3,
  'hired':                      4,
};

function mapStage(name) {
  if (!name) return -1;
  return STAGE_MAP[name.toLowerCase().trim()] ?? -1;
}

function getHeaders() {
  return {
    'Authorization': `Token token=${_k}`,
    'X-Api-Version': '20240904',
    'Content-Type': 'application/vnd.api+json'
  };
}

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function handleLogin() {
  const input = document.getElementById('api-key-input').value.trim();
  const errorEl = document.getElementById('login-error');
  const btn = document.querySelector('.login-btn');
  if (!input) { errorEl.textContent = 'Ange lösenord.'; return; }
  btn.textContent = 'Verifierar...';
  btn.style.opacity = '0.6';
  const hash = await sha256(input);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem('tt_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    setTimeout(() => {
      document.body.scrollTop = 0;
      document.documentElement.scrollTop = 0;
      window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
    }, 100);
    init();
  } else {
    errorEl.textContent = 'Fel lösenord.';
    btn.textContent = 'Logga in';
    btn.style.opacity = '1';
    document.getElementById('api-key-input').value = '';
    document.getElementById('api-key-input').focus();
  }
}

document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

if (sessionStorage.getItem('tt_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
}

// Clock
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// Countdown
function startCountdown() {
  let val = REFRESH_INTERVAL / 1000;
  const el = document.getElementById('refresh-countdown');
  clearInterval(window._cd);
  window._cd = setInterval(() => {
    val--;
    const m = Math.floor(val / 60);
    const s = val % 60;
    el.textContent = `Uppdateras om ${m}:${String(s).padStart(2,'0')}`;
    if (val <= 0) clearInterval(window._cd);
  }, 1000);
}

async function apiFetch(url) {
  const res = await fetch(url, { headers: getHeaders() });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchAll(endpoint) {
  let url = `${API_BASE}${endpoint}`;
  let all = [], included = [];
  while (url) {
    const data = await apiFetch(url);
    all = all.concat(data.data || []);
    if (data.included) included = included.concat(data.included);
    url = data.links?.next || null;
  }
  all._included = included;
  return all;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setProgress(text) {
  const el = document.getElementById('progress-text');
  if (el) el.textContent = text;
}

let isFirstLoad = true;

async function fetchData() {
  const statusEl = document.getElementById('status-message');
  const pipeline = document.getElementById('pipeline');
  const updateIndicator = document.getElementById('update-indicator');

  try {
    if (isFirstLoad) {
      // Första laddning: visa spinner, dölj pipeline
      pipeline.style.display = 'none';
      statusEl.style.display = 'block';
      setProgress('Hämtar jobb...');    } else {
      // Bakgrundsuppdatering: behåll pipeline synlig, visa liten indikator
      updateIndicator.classList.add('visible');
    }

    // 1. Hämta jobb
    const jobs = await fetchAll('/jobs?filter[status]=published&page[size]=30');
    if (jobs.length === 0) {
      statusEl.textContent = 'Inga aktiva jobbannonser.';
      return;
    }

    const jobTitles = {};
    jobs.forEach(j => { jobTitles[j.id] = j.attributes?.title || `Jobb #${j.id}`; });

    // 2. Hämta kandidater + stage per jobb i ett anrop
    // /jobs/{id}/candidates?include=job-applications.stage
    // Returnerar kandidater (data) + job-applications + stages (included)
    const allItems = [];

    for (let i = 0; i < jobs.length; i++) {
      if (isFirstLoad) setProgress(`Hämtar jobb... ${i + 1} / ${jobs.length}`);
      try {
        const result = await fetchAll(
          `/jobs/${jobs[i].id}/candidates?include=job-applications.stage&page[size]=30`
        );
        const included = result._included || [];

        // Bygg lookup: stage-id → stage-namn
        const stageById = {};
        included.forEach(item => {
          if (item.type === 'stages') stageById[item.id] = item.attributes?.name || '';
        });

        // Bygg set med app-IDs som tillhör detta jobb (från included)
        const jobAppIds = new Set(
          included.filter(i => i.type === 'job-applications').map(i => i.id)
        );

        // Bygg lookup: job-application-id → stage-namn
        const appStageMap = {};
        included.forEach(item => {
          if (item.type === 'job-applications') {
            const stageId = item.relationships?.stage?.data?.id;
            if (stageId) appStageMap[item.id] = stageById[stageId] || '';
          }
        });

        result.forEach(candidate => {
          // Filtrera kandidatens app-IDs till bara de som tillhör detta jobb
          const appIds = (candidate.relationships?.['job-applications']?.data || [])
            .map(d => d.id)
            .filter(id => jobAppIds.has(id));

          let colIndex = -1;
          for (const appId of appIds) {
            const c = mapStage(appStageMap[appId]);
            if (c > colIndex) colIndex = c;
          }
          if (colIndex === -1) return;
          const first = candidate.attributes?.['first-name'] || '';
          const last = candidate.attributes?.['last-name'] || '';
          const name = `${first} ${last}`.trim() || '–';
          allItems.push({ jobTitle: jobTitles[jobs[i].id], jobId: jobs[i].id, colIndex, candidateName: name });
        });
      } catch (e) {}
    }

    // Bygg jobbfärgkarta
    const JOB_COLORS = [
      '#e85d4a','#e8a23a','#4a90d9','#7c3aed','#16a34a',
      '#db2777','#0891b2','#d97706','#4f46e5','#059669',
    ];
    const jobColorMap = {};
    jobs.forEach((j, idx) => {
      jobColorMap[j.id] = JOB_COLORS[idx % JOB_COLORS.length];
    });

    // 4. Rendera kolumner
    const cols = [[], [], [], [], []];
    allItems.forEach(item => cols[item.colIndex].push(item));

    cols.forEach((items, i) => {
      document.getElementById(`count-${i}`).textContent = items.length;
      const body = document.getElementById(`body-${i}`);
      body.innerHTML = items.length === 0
        ? `<div class="empty-col">Inga kandidater</div>`
        : items.map((item, j) => {
            const color = jobColorMap[item.jobId] || '#888';
            return `
            <div class="candidate-card" style="animation-delay:${j * 20}ms">
              <div class="name">${escapeHtml(item.candidateName)}</div>
              <div class="job">
                <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color};margin-right:5px;flex-shrink:0;vertical-align:middle;position:relative;top:-1px"></span>${escapeHtml(item.jobTitle)}
              </div>
            </div>`;
          }).join('');
    });

    // Visa pipeline, dölj spinner
    statusEl.style.display = 'none';
    pipeline.style.display = 'grid';
    updateIndicator.classList.remove('visible');

    // Starta auto-scroll på TV efter rendering
    setTimeout(() => window._startAutoScroll?.(), 1000);

    document.getElementById('last-updated').textContent =
      `Senast uppdaterad: ${new Date().toLocaleString('sv-SE')}`;

    isFirstLoad = false;

  } catch (err) {
    console.error(err);
    updateIndicator.classList.remove('visible');
    if (isFirstLoad) {
      statusEl.innerHTML = `<div style="color:#dc2626;font-size:13px"">⚠ ${escapeHtml(err.message)}</div>`;
    }
    // Vid bakgrundsfel: behåll gammal data, gör inget
  }
}

let refreshTimer = null;

async function init() {
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  await fetchData();
  startCountdown();
  clearInterval(refreshTimer);
  refreshTimer = setInterval(async () => {
    await fetchData();
    startCountdown();
  }, REFRESH_INTERVAL);
}

// Fullscreen
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    document.getElementById('fullscreen-btn').innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
      </svg>
      Avsluta`;
  } else {
    document.exitFullscreen().catch(() => {});
    document.getElementById('fullscreen-btn').innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
      Helskärm`;
  }
}

// Swipe dots
const pipeline = document.getElementById('pipeline');
const dots = document.querySelectorAll('.swipe-dot');

pipeline.addEventListener('scroll', () => {
  const index = Math.round(pipeline.scrollLeft / pipeline.offsetWidth);
  dots.forEach((d, i) => d.classList.toggle('active', i === index));
});

dots.forEach(dot => {
  dot.addEventListener('click', () => {
    const i = parseInt(dot.dataset.index);
    pipeline.scrollTo({ left: i * pipeline.offsetWidth, behavior: 'smooth' });
  });
});

// Auto-scroll kolumner på TV
function startColumnAutoScroll() {
  if (window.innerWidth < 1200) return; // Bara på TV/desktop

  const bodies = document.querySelectorAll('.stage-body');
  const SPEED = 0.4;        // px per frame – lugnt tempo
  const PAUSE_MS = 2000;    // paus i topp/botten innan riktningsbyte

  bodies.forEach(body => {
    let direction = 1;
    let pausing = false;
    let pauseTimer = null;

    function step() {
      if (pausing) return;

      const maxScroll = body.scrollHeight - body.clientHeight;
      if (maxScroll <= 0) return; // Inget att scrolla

      body.scrollTop += SPEED * direction;

      if (body.scrollTop >= maxScroll - 1) {
        body.scrollTop = maxScroll;
        pausing = true;
        pauseTimer = setTimeout(() => {
          direction = -1;
          pausing = false;
        }, PAUSE_MS);
      } else if (body.scrollTop <= 0) {
        body.scrollTop = 0;
        pausing = true;
        pauseTimer = setTimeout(() => {
          direction = 1;
          pausing = false;
        }, PAUSE_MS);
      }
    }

    // Starta med en liten fördröjning per kolumn för att de inte rör sig synkront
    const offset = Array.from(bodies).indexOf(body) * 800;
    setTimeout(() => {
      setInterval(step, 16); // ~60fps
    }, offset);
  });
}

// Starta auto-scroll när data laddats
const _origRender = window._autoScrollStarted;
window._startAutoScroll = startColumnAutoScroll;

if (sessionStorage.getItem('tt_auth') === '1') init();
